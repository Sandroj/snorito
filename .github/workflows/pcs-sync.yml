# Haalt elke 10 minuten etappe-uitslagen op van letour.fr (officiële bron,
# geen Cloudflare — kale fetch volstaat, geen browser nodig) en levert ze af
# bij Snorito. De aanroep van pcs-pending maakt de (slapende) Render-instantie
# ook wakker en vertelt welke etappes een uitslag nodig hebben.
# Secrets: APP_URL (https://….onrender.com) en CRON_SECRET (ook in Render als env-var).
name: Uitslagen sync

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Vraag Snorito welke etappes een uitslag nodig hebben
        id: pending
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          RES=$(curl -fsS --max-time 120 -H "Authorization: Bearer $CRON_SECRET" "$APP_URL/api/cron/pcs-pending")
          echo "$RES"
          echo "pending=$RES" >> "$GITHUB_OUTPUT"
          echo "count=$(echo "$RES" | jq '.stages | length')" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.pending.outputs.count != '0'

      - uses: actions/setup-node@v4
        if: steps.pending.outputs.count != '0'
        with:
          node-version: 22

      - name: Haal letour.fr-klassementen op en lever ze af
        if: steps.pending.outputs.count != '0'
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          PENDING: ${{ steps.pending.outputs.pending }}
        run: node .github/scripts/letour-fetch.mjs
