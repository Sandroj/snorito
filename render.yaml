# Render Blueprint — deploy Snorito als één web-service (API + gebouwde frontend).
# Zie: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: snorito
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22.18.0
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      # Data staat in Neon Postgres en overleeft deploys. In het dashboard
      # staan als env-vars: DATABASE_URL (Neon), GOOGLE_CLIENT_ID/SECRET,
      # BREVO_API_KEY + MAIL_FROM (wachtwoord-reset-mails) en CRON_SECRET
      # (zelfde waarde als het GitHub-secret voor .github/workflows/pcs-sync.yml).
      # De database wordt automatisch geseed bij de eerste (lege) boot.
